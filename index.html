<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅见 - Books are the only thing that never grows old.</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <!-- 使用 UMD 版本的 Supabase SDK -->
    <script src="https://fastly.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root { 
            --bg-color: #F4F1EA; /* 更具高级感的米黄色 */
            --card-bg: #FFFFFF;
            --text-main: #2C2C2C;
            --text-light: #8C8C8C;
            --accent-color: #5D6D49; /* 更加深沉的橄榄绿 */
            --accent-hover: #4A573A;
            --border-color: #DED9CC;
            --danger-color: #A64444;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0; line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, .serif { font-family: 'Noto Serif SC', serif; font-weight: 700; }
        .container { max-width: 850px; margin: 0 auto; padding: 60px 20px; }
        
    /* 「正在读」更换在读书籍：橄榄绿虚线、无底色、hover 浅色底 */
    .upload-trigger-cr {
        background: transparent;
        border: 1.5px dashed var(--accent-color);
        color: var(--accent-color);
        padding: 10px 18px;
        font-size: 13px;
        letter-spacing: 0.5px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        line-height: 1.4;
        flex-shrink: 0;
    }
    .upload-trigger-cr:hover {
        background: rgba(93, 109, 73, 0.08);
        border-color: var(--accent-hover);
        color: var(--accent-hover);
    }

        .cr-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .cr-section-header .section-label { margin-bottom: 0; }

        /* 按钮美化 */
        button { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 30px; border: none; font-family: inherit; }
        /* 覆盖全局 button 的 solid/none，保留更换在读的虚线橄榄绿描边与圆角 */
        button.upload-trigger-cr {
            border: 1.5px dashed var(--accent-color);
            border-radius: 14px;
            background: transparent;
        }
        button.upload-trigger-cr:hover {
            border-style: dashed;
        }
        .btn-primary { background: var(--accent-color); color: white; padding: 10px 24px; font-size: 14px; letter-spacing: 1px; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(93, 109, 73, 0.3); }
        .btn-secondary { background: white; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 8px 20px; font-size: 13px; }
        .btn-text { background: none; border: none; color: var(--text-light); padding: 0; font-size: 14px; }
        .btn-text:hover { color: var(--danger-color); }

        /* 顶部 Logo 区 */
        header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 80px; }
        header h1 { font-size: 32px; margin: 0; letter-spacing: -1px; }
        header p { color: var(--text-light); margin: 0; font-size: 14px; margin-top: 5px; }

        /* 正在读 - 艺术卡片 */
        .section-label { font-size: 12px; color: var(--text-light); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .cr-card { 
            background: var(--card-bg); border-radius: 20px; padding: 40px; 
            display: flex; gap: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            margin-bottom: 80px; position: relative; overflow: hidden;
        }
        .cr-card::after { content: "Reading"; position: absolute; right: -20px; top: 20px; font-size: 80px; font-weight: 900; color: #f9f9f9; z-index: 0; pointer-events: none; }
        .cr-card img { width: 160px; height: 230px; object-fit: cover; border-radius: 10px; box-shadow: 10px 10px 30px rgba(0,0,0,0.1); z-index: 1; cursor: pointer; }
        .cr-info { flex: 1; z-index: 1; display: flex; flex-direction: column; justify-content: center; }
        .cr-title { font-size: 28px; margin: 0 0 6px 0; }
        .cr-author { color: var(--text-light); font-size: 14px; margin: 0 0 24px 0; line-height: 1.5; }

        /* 电子书架网格 */
        .bookshelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 40px; align-items: start; }
        .book-item { cursor: grab; transition: transform 0.3s; position: relative; }
        .book-item:hover { transform: translateY(-10px); }
        .book-item:active { cursor: grabbing; }
        .book-item.dragging { opacity: 0.45; cursor: grabbing; transform: scale(0.97); z-index: 10; }
        .book-cover-wrapper { position: relative; margin-bottom: 15px; }
        .book-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); pointer-events: none; }
        .book-item h4 { margin: 10px 0 5px 0; font-size: 15px; pointer-events: none; }
        .book-item .author { font-size: 12px; color: var(--text-light); pointer-events: none; }
        .book-card-delete {
            position: absolute;
            bottom: 10px;
            left: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(44,44,44,0.35);
            color: #fff;
            font-size: 14px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: auto;
            transition: opacity 0.2s, background 0.2s;
            z-index: 3;
            padding: 0;
        }
        .book-item:hover .book-card-delete { opacity: 1; }
        .book-card-delete:hover { background: rgba(166, 68, 68, 0.85); }
        .shelf-header-actions { display: inline-flex; align-items: center; gap: 20px; flex-shrink: 0; }
        button.btn-shelf-search { background: none; border: none; color: var(--text-light); font-size: 14px; padding: 10px 0; border-radius: 0; cursor: pointer; }
        button.btn-shelf-search:hover { color: var(--accent-color); }
        /* 拖拽占位：接受拖放时在书籍间显示提示 */
        .bookshelf-drag-over-item { outline: 2px dashed var(--accent-color); outline-offset: 4px; border-radius: 10px; }
        @keyframes shelf-search-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(93, 109, 73, 0.45); }
            40% { box-shadow: 0 0 0 10px rgba(93, 109, 73, 0.12); }
        }
        .book-item.shelf-search-hit { animation: shelf-search-pulse 0.85s ease 2; border-radius: 10px; }
        
        /* 评分星星样式（表单选单等） */
        .stars { color: #D4AF37; font-size: 12px; margin-top: 5px; }

        /* 详情页增强 */
        .detail-meta-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 50px; margin-bottom: 60px; align-items: start; }
        .detail-cover-wrap {
            width: 160px; max-width: 100%; margin: 0 auto;
            border-radius: 10px; overflow: hidden; box-shadow: 10px 10px 30px rgba(0,0,0,0.1);
            flex-shrink: 0; aspect-ratio: 160 / 230;
        }
        .detail-cover { width: 100%; height: 100%; display: block; object-fit: cover; border-radius: 10px; }
        .info-row { margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px 16px; }
        .info-label { color: var(--text-light); font-size: 14px; }
        .detail-rating-row { display: inline-flex; gap: 4px; align-items: center; }
        .detail-star {
            cursor: pointer; background: none; border: none; padding: 0 2px; font-size: 22px;
            line-height: 1; color: #DEDEDE; border-radius: 0; transition: color 0.15s, transform 0.15s;
        }
        .detail-star.on { color: #C9A227; text-shadow: 0 1px 0 rgba(0,0,0,0.08); }
        .detail-star:hover { transform: scale(1.12); color: #D4AF37; }
        .detail-star:focus-visible { outline: 2px solid var(--accent-color); outline-offset: 2px; }
        .detail-tags-section { margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border-color); }
        .detail-tags-label { margin: 0 0 12px; font-size: 12px; color: var(--text-light); letter-spacing: 0.12em; text-transform: uppercase; }
        .detail-tag-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .tag-pill {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px 6px 12px;
            background: rgba(93, 109, 73, 0.1); color: var(--accent-hover); border-radius: 999px; font-size: 13px;
        }
        .tag-pill .tag-remove {
            cursor: pointer; border: none; background: rgba(0,0,0,0.06); color: var(--text-light);
            width: 20px; height: 20px; border-radius: 50%; font-size: 14px; line-height: 1; padding: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .tag-pill .tag-remove:hover { background: var(--danger-color); color: #fff; }
        .tag-add-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 1.5px dashed var(--accent-color);
            background: transparent; color: var(--accent-color); font-size: 18px; line-height: 1; padding: 0;
        }
        .tag-add-btn:hover { background: rgba(93, 109, 73, 0.08); }

        /* 阅读足迹时间轴 */
        .timeline-card { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border-color); }
        .timeline-card:last-child { border-bottom: none; }
        .timeline-card-meta { font-size: 12px; color: var(--text-light); margin-bottom: 14px; letter-spacing: 0.02em; display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; }
        .timeline-time-hit {
            cursor: pointer; border: none; background: rgba(93, 109, 73, 0.09); color: var(--accent-hover);
            font-size: 12px; padding: 4px 10px; font-family: inherit; border-radius: 999px;
        }
        .timeline-time-hit:hover { background: rgba(93, 109, 73, 0.16); }
        .timeline-datetime-input {
            padding: 6px 8px; border: 1px solid var(--accent-color); border-radius: 8px; font-size: 12px;
            font-family: inherit; color: var(--text-main); max-width: 100%; box-sizing: border-box;
        }
        .log-quote-block {
            font-family: 'Noto Serif SC', Georgia, serif; font-style: italic; font-size: 17px;
            color: #3a3a3a; line-height: 1.75; margin: 0 0 14px 0; padding: 14px 16px 14px 18px;
            border-left: 4px solid var(--accent-color); background: rgba(255,255,255,0.65);
            border-radius: 0 10px 10px 0;
        }
        .log-note-block {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px; color: #6b6b6b; letter-spacing: 0.04em; line-height: 1.85; margin: 0 0 14px 0;
        }
        .log-photo-wrap { margin-top: 12px; }
        .log-photo-wrap .log-photo {
            max-width: 100%; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            display: block;
        }
        
        /* 读后感区块 */
        .review-section { 
            background: #fdfdfd; padding: 40px; border-radius: 15px; 
            border-left: 4px solid var(--accent-color); margin-bottom: 60px;
            font-style: italic; line-height: 2;
        }

        /* 弹窗样式 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,44,44,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 450px; max-height: 90vh; overflow-y: auto; }
        .modal-content input, .modal-content textarea, .modal-content select { 
            width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #EEE; border-radius: 10px; box-sizing: border-box;
        }
        textarea.log-autosize {
            resize: none;
            overflow: hidden;
            min-height: 3rem;
            line-height: 1.65;
            field-sizing: content;
        }
        .log-modal-title-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .log-modal-title-row h3 { margin: 0; }
        .log-modal-hint { margin: 0; font-size: 13px; color: var(--text-light); line-height: 1.5; flex-shrink: 0; }
        .log-photo-label { font-size: 12px; color: var(--text-light); margin: 0 0 6px; line-height: 1.45; }

        .btn-primary:disabled,
        button.btn-primary.log-submit-muted:disabled {
            opacity: 0.42;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(0.25);
            box-shadow: none;
        }
        button.btn-primary:disabled:hover { transform: none; box-shadow: none; background: var(--accent-color); }

        #loading-overlay { display: none; position: fixed; top:20px; right:20px; background:var(--accent-color); color:white; padding:10px 20px; border-radius:30px; z-index:9999; font-size:12px; }
    </style>
</head>
<body>

<div id="loading-overlay">正在处理...</div>

<div class="container">
    <header>
        <div>
            <h1 class="serif">阅见.</h1>
            <p>Books are the only thing that never grows old.</p>
        </div>
    </header>

    <div id="home-view">
        <div class="cr-section-header">
            <span class="section-label">Currently Reading / 正在读</span>
            <button type="button" class="upload-trigger-cr" onclick="openAddBookModalReplaceReading()">＋ 更换在读书籍</button>
        </div>
        <div id="currently-reading-container"></div>

        <div class="cr-section-header" style="margin-top: 60px;">
            <span class="section-label">Collection / 电子书架</span>
            <div class="shelf-header-actions">
                <button type="button" class="btn-shelf-search" onclick="openSearchModal()">🔍 搜索</button>
                <button type="button" class="upload-trigger-cr" onclick="openUploadModal('read')">＋ 录入新书</button>
            </div>
        </div>
        <div class="bookshelf" id="bookshelf-container"></div>
    </div>

    <!-- 详情页视图 -->
    <div id="detail-view" style="display: none;">
        <button class="btn-text" onclick="showHome()" style="margin-bottom: 40px;">← 返回馆藏</button>
        <div id="detail-content-wrapper"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 60px 0 30px 0;">
            <h3 class="serif" style="margin: 0;">阅读足迹</h3>
            <button class="btn-primary" type="button" onclick="openAddLogModal()">＋ 记录瞬间</button>
        </div>
        <div class="timeline" id="timeline-container"></div>
    </div>
</div>

<!-- 弹窗区 -->
<div id="add-book-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="serif" id="add-book-modal-title">录入新书</h3>
        <input id="input-title" type="text" placeholder="书名">
        <input id="input-author" type="text" placeholder="作者">
        <div id="add-book-bookshelf-fields">
            <select id="input-status">
                <option value="reading">立即开始阅读 (设为在读)</option>
                <option value="read">已读完 (放入书架)</option>
            </select>
        </div>
        <div style="font-size: 12px; color: #777; margin-bottom: 10px;">封面图片</div>
        <input id="input-cover-file" type="file" accept="image/*">
        
        <div id="add-book-bookshelf-fields-extra">
            <select id="input-rating">
                <option value="0">点击评分</option>
                <option value="5">★★★★★ 满分推荐</option>
                <option value="4">★★★★☆ 值得一读</option>
                <option value="3">★★★☆☆ 普普通通</option>
                <option value="2">★★☆☆☆ 勉强看完</option>
                <option value="1">★☆☆☆☆ 不推荐</option>
            </select>
            <textarea id="input-review" rows="4" placeholder="写下总体的读后感..."></textarea>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px;">
            <button class="btn-text" onclick="closeModal('add-book-modal')">取消</button>
            <button class="btn-primary" id="add-book-submit-btn" onclick="saveBook()">保存馆藏</button>
        </div>
    </div>
</div>

<div id="search-shelf-modal" class="modal-overlay">
    <div class="modal-content" style="width:400px;">
        <h3 class="serif" style="margin-top:0;">搜索藏书</h3>
        <p style="margin: 0 0 12px; font-size: 13px; color: var(--text-light);">输入书名或作者关键词，将在书架中高亮定位</p>
        <input id="shelf-search-input" type="text" placeholder="书名或作者" onkeydown="if(event.key==='Enter') searchBook();">
        <div style="display: flex; justify-content: flex-end; gap: 15px;">
            <button type="button" class="btn-text" onclick="closeModal('search-shelf-modal')">关闭</button>
            <button type="button" class="btn-primary" onclick="searchBook()">定位</button>
        </div>
    </div>
</div>

<div id="add-log-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="log-modal-title-row">
            <h3 class="serif">记录瞬间</h3>
            <p class="log-modal-hint">可以任意选填~</p>
        </div>
        <input id="input-log-weather" type="text" placeholder="天气和地点，如雨夜／咖啡馆">
        <textarea id="input-log-quote" class="log-autosize" rows="2" placeholder="金句摘抄"></textarea>
        <textarea id="input-log-content" class="log-autosize" rows="3" placeholder="此刻想法"></textarea>
        <p class="log-photo-label">可上传读书过程中拍下的配图（随笔配图）</p>
        <input id="input-log-photo" type="file" accept="image/*">
        <div style="display: flex; justify-content: flex-end; gap: 15px;">
            <button type="button" class="btn-text" onclick="closeModal('add-log-modal')">取消</button>
            <button type="button" class="btn-primary log-submit-muted" id="log-submit-btn" disabled onclick="saveLog()">记录</button>
        </div>
    </div>
</div>

<div id="add-tag-modal" class="modal-overlay" style="z-index: 1100;">
    <div class="modal-content" style="width: 360px;">
        <h3 class="serif" style="margin-top:0;">添加标签</h3>
        <p style="margin: -8px 0 14px; font-size: 13px; color: var(--text-light);">录入文字即可，无需输入 #</p>
        <input id="input-new-tag" type="text" placeholder="例如：历史">
        <div style="display: flex; justify-content: flex-end; gap: 15px;">
            <button type="button" class="btn-text" onclick="closeModal('add-tag-modal')">取消</button>
            <button type="button" class="btn-primary" onclick="confirmAddBookTag()">添加</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://puxfddsmsjxeorjiovbb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eGZkZHNtc2p4ZW9yamlvdmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTExNzAsImV4cCI6MjA5Mzc4NzE3MH0.55nNn85QiRpWfE1wcnEoCl9yW70jdCkCg3JL5J-QbKk';

    let db;
    let currentBookId = null;
    /** 录入来源：replace-reading = 从「正在读」更换；bookshelf = 从电子书架录入 */
    let bookEntrySource = 'bookshelf';
    /** 书架弹窗预设状态，由 openUploadModal 写入 */
    let targetStatus = 'read';
    /** 书架「录入新书」仅用书名/作者/封面时的精简表单 */
    let bookshelfCoreOnlyUpload = false;
    /** 书架拖拽缓存 */
    let shelfDragEl = null;

    function showLoading() { document.getElementById('loading-overlay').style.display = 'block'; }
    function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        if (id === 'add-book-modal') {
            const sel = document.getElementById('input-status');
            if (sel) sel.disabled = false;
            setAddBookModalBookshelfSectionsVisible(true);
            document.getElementById('add-book-submit-btn').textContent = '保存馆藏';
            bookshelfCoreOnlyUpload = false;
            targetStatus = 'read';
        }
        if (id === 'add-log-modal') {
            const q = document.getElementById('input-log-quote');
            const c = document.getElementById('input-log-content');
            if (q) q.style.height = '';
            if (c) c.style.height = '';
            updateLogFormState();
        }
    }

    function autosizeTextarea(el) {
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.max(el.scrollHeight, 52) + 'px';
    }

    function updateLogFormState() {
        const quote = (document.getElementById('input-log-quote')?.value || '').trim();
        const content = (document.getElementById('input-log-content')?.value || '').trim();
        const photo = document.getElementById('input-log-photo')?.files?.length > 0;
        const ok = quote.length > 0 || content.length > 0 || photo;
        const btn = document.getElementById('log-submit-btn');
        if (btn) btn.disabled = !ok;
    }

    function openAddLogModal() {
        document.getElementById('input-log-weather').value = '';
        document.getElementById('input-log-quote').value = '';
        document.getElementById('input-log-content').value = '';
        document.getElementById('input-log-photo').value = '';
        openModal('add-log-modal');
        updateLogFormState();
        requestAnimationFrame(() => {
            autosizeTextarea(document.getElementById('input-log-quote'));
            autosizeTextarea(document.getElementById('input-log-content'));
        });
    }

    /** 书架：打开搜索弹窗 */
    function openSearchModal() {
        openModal('search-shelf-modal');
        const input = document.getElementById('shelf-search-input');
        input.value = '';
        setTimeout(() => input.focus(), 100);
    }

    /** 书架：根据关键词平滑滚动并高亮匹配的卡片 */
    function searchBook() {
        const q = document.getElementById('shelf-search-input').value.trim().toLowerCase();
        if (!q) {
            alert("请输入书名或作者");
            return;
        }
        document.querySelectorAll('.book-item.shelf-search-hit').forEach(el => el.classList.remove('shelf-search-hit'));
        const items = [...document.querySelectorAll('#bookshelf-container .book-item[data-book-id]')];
        const hit = items.find(el => {
            const t = (el.dataset.bookTitle || '').toLowerCase();
            const a = (el.dataset.bookAuthor || '').toLowerCase();
            return t.includes(q) || a.includes(q);
        });
        if (!hit) {
            alert("没有找到匹配的藏书");
            return;
        }
        closeModal('search-shelf-modal');
        hit.scrollIntoView({ behavior: 'smooth', block: 'center' });
        hit.classList.add('shelf-search-hit');
        setTimeout(() => hit.classList.remove('shelf-search-hit'), 2600);
    }

    function setAddBookModalBookshelfSectionsVisible(visible) {
        const mode = visible ? 'block' : 'none';
        const box = document.getElementById('add-book-bookshelf-fields');
        const extra = document.getElementById('add-book-bookshelf-fields-extra');
        if (box) box.style.display = mode;
        if (extra) extra.style.display = mode;
    }

    function openAddBookModalReplaceReading() {
        bookEntrySource = 'replace-reading';
        document.getElementById('add-book-modal-title').textContent = '更换在读书籍';
        document.getElementById('input-status').value = 'reading';
        setAddBookModalBookshelfSectionsVisible(false);
        document.getElementById('add-book-submit-btn').textContent = '确认更换';
        bookshelfCoreOnlyUpload = false;
        openModal('add-book-modal');
    }

    /** 书架录入：openUploadModal('read') 设为藏书（status 为 read 时仅用书名 / 作者 / 封面三项） */
    function openUploadModal(status) {
        bookEntrySource = 'bookshelf';
        targetStatus = status;
        document.getElementById('input-status').value = status;
        document.getElementById('input-status').disabled = false;
        bookshelfCoreOnlyUpload = (status === 'read');

        if (bookshelfCoreOnlyUpload) {
            document.getElementById('add-book-modal-title').textContent = '录入新藏书';
            setAddBookModalBookshelfSectionsVisible(false);
        } else {
            document.getElementById('add-book-modal-title').textContent = '录入新书';
            setAddBookModalBookshelfSectionsVisible(true);
        }

        document.getElementById('add-book-submit-btn').textContent = '保存馆藏';
        openModal('add-book-modal');
    }

    function showHome() { 
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
        fetchBooks(); 
    }

    window.onload = function() {
        db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        wireLogModalInputs();
        fetchBooks();
    };

    function wireLogModalInputs() {
        const quote = document.getElementById('input-log-quote');
        const content = document.getElementById('input-log-content');
        const photo = document.getElementById('input-log-photo');
        [quote, content].forEach(el => {
            if (!el) return;
            el.addEventListener('input', () => {
                autosizeTextarea(el);
                updateLogFormState();
            });
        });
        if (photo) photo.addEventListener('change', updateLogFormState);
    }

    /** 数据集 / 表单里安全放置到 HTML 属性 */
    function escapeHtmlAttr(s) {
        if (s == null) return '';
        return String(s)
            .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;').replace(/</g, '&lt;');
    }

    function escapeHtmlText(s) {
        if (s == null) return '';
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 工具：生成静态星星文本（表单等）
    function getStars(rating) {
        const r = Math.min(5, Math.max(0, Number(rating) || 0));
        return '★'.repeat(r) + '☆'.repeat(5 - r);
    }

    /** books.tags 统一为 string[] */
    function normalizeTags(book) {
        if (!book) return [];
        const t = book.tags;
        if (Array.isArray(t)) return t.map(String).filter(Boolean);
        if (t && typeof t === 'object') return Object.values(t).map(String).filter(Boolean);
        if (typeof t === 'string') {
            try {
                const p = JSON.parse(t);
                return Array.isArray(p) ? p.map(String).filter(Boolean) : [];
            } catch (_) { return t.trim() ? [t.trim()] : []; }
        }
        return [];
    }

    /** 用于 datetime-local 的取值（本地日历） */
    function toDatetimeLocalValue(d) {
        if (!(d instanceof Date) || Number.isNaN(d.getTime())) return '';
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function logEffectiveTimestamp(log) {
        return log.logged_at || log.created_at;
    }

    /** 点击时间后改写 logged_at（需在 Supabase 的 reading_logs 表添加 logged_at timestamptz 可空） */
    function startTimelineTimeEdit(btn) {
        const logId = btn.getAttribute('data-log-id');
        const isoRaw = btn.getAttribute('data-iso');
        if (!logId || !isoRaw) return;
        const d = new Date(isoRaw);
        if (Number.isNaN(d.getTime())) return;
        const input = document.createElement('input');
        input.type = 'datetime-local';
        input.className = 'timeline-datetime-input';
        input.value = toDatetimeLocalValue(d);
        btn.replaceWith(input);
        input.focus();

        let finished = false;
        const finalize = async (saveIfPossible) => {
            if (finished) return;
            finished = true;
            if (saveIfPossible && input.value) {
                const newIso = new Date(input.value).toISOString();
                showLoading();
                const { error } = await db.from('reading_logs').update({ logged_at: newIso }).eq('id', logId);
                hideLoading();
                if (error) {
                    alert(error.message + '\n\n若为列不存在错误，请在 Supabase 中为 reading_logs 增加列 logged_at（类型 timestamptz，可空）。');
                }
            }
            openBookDetail(currentBookId);
        };

        const onBlur = () => finalize(true);
        input.addEventListener('blur', onBlur);
        input.addEventListener('keydown', function onEv(ev) {
            if (ev.key === 'Enter') {
                ev.preventDefault();
                input.removeEventListener('keydown', onEv);
                input.blur();
            }
            if (ev.key === 'Escape') {
                ev.preventDefault();
                input.removeEventListener('keydown', onEv);
                input.removeEventListener('blur', onBlur);
                if (!finished) {
                    finished = true;
                    openBookDetail(currentBookId);
                }
            }
        });
    }

    async function setBookRating(bookId, rating) {
        const r = Math.min(5, Math.max(1, Number(rating)));
        showLoading();
        const { error } = await db.from('books').update({ rating: r }).eq('id', bookId);
        hideLoading();
        if (error) { alert(error.message); return; }
        openBookDetail(bookId);
    }

    function openAddTagModal() {
        document.getElementById('input-new-tag').value = '';
        openModal('add-tag-modal');
        setTimeout(() => document.getElementById('input-new-tag').focus(), 120);
    }

    async function confirmAddBookTag() {
        let raw = document.getElementById('input-new-tag').value.trim();
        raw = raw.replace(/^#+/g, '').trim();
        if (!raw) {
            alert('请输入标签名称');
            return;
        }
        const bookId = currentBookId;
        showLoading();
        const { data: book } = await db.from('books').select('tags').eq('id', bookId).single();
        hideLoading();
        let tags = normalizeTags(book);
        if (tags.includes(raw)) {
            alert('标签已存在');
            return;
        }
        tags.push(raw);
        showLoading();
        const { error } = await db.from('books').update({ tags }).eq('id', bookId);
        hideLoading();
        if (error) { alert(error.message); return; }
        closeModal('add-tag-modal');
        openBookDetail(bookId);
    }

    async function removeBookTag(tag) {
        const bookId = currentBookId;
        showLoading();
        const { data: book } = await db.from('books').select('tags').eq('id', bookId).single();
        hideLoading();
        let tags = normalizeTags(book).filter(t => t !== tag);
        showLoading();
        const { error } = await db.from('books').update({ tags }).eq('id', bookId);
        hideLoading();
        if (error) { alert(error.message); return; }
        openBookDetail(bookId);
    }

    async function uploadFile(fileInput, bucketName) {
        const file = fileInput.files[0];
        if (!file) return null;
        const fileName = `${Math.random().toString(36).substring(2)}_${Date.now()}.${file.name.split('.').pop()}`;
        showLoading();
        const { data, error } = await db.storage.from(bucketName).upload(fileName, file);
        if (error) { alert("图片上传失败"); hideLoading(); return null; }
        const { data: publicData } = db.storage.from(bucketName).getPublicUrl(fileName);
        hideLoading();
        return publicData.publicUrl;
    }

    async function fetchBooks() {
        const { data: books, error } = await db.from('books').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);

        const crContainer = document.getElementById('currently-reading-container');
        const shelfContainer = document.getElementById('bookshelf-container');
        crContainer.innerHTML = '';
        shelfContainer.innerHTML = '';

        books.forEach(book => {
            const cover = book.cover_url || 'https://via.placeholder.com/150x220?text=No+Cover';
            if (book.status === 'reading') {
                const authorLine = book.author
                    ? `<p class="cr-author">${book.author}</p>`
                    : `<p class="cr-author" style="opacity:.85;">作者未填写</p>`;
                crContainer.innerHTML = `
                    <div class="cr-card">
                        <img src="${cover}" onclick="openBookDetail(${book.id})">
                        <div class="cr-info">
                            <h2 class="serif cr-title" onclick="openBookDetail(${book.id})">${book.title}</h2>
                            ${authorLine}
                            <div style="display:flex; gap:15px;">
                                <button class="btn-secondary" onclick="openBookDetail(${book.id})">打开随笔</button>
                                <button class="btn-text" onclick="updateStatus(${book.id}, 'read')">标记为读完</button>
                            </div>
                        </div>
                    </div>`;
            } else {
                const titleEsc = escapeHtmlAttr(book.title);
                const authorEsc = escapeHtmlAttr(book.author || '');
                shelfContainer.innerHTML += `
                    <div class="book-item" data-book-id="${book.id}" data-book-title="${titleEsc}" data-book-author="${authorEsc}" onclick="if(!event.target.closest('.book-card-delete')) openBookDetail(${book.id})">
                        <div class="book-cover-wrapper">
                            <img src="${cover}" alt="">
                            <button type="button" class="book-card-delete" title="从书架删除" aria-label="删除" onclick="event.stopPropagation(); deleteBook(${book.id})">✕</button>
                        </div>
                        <h4 class="serif">${escapeHtmlText(book.title)}</h4>
                        <div class="author">${escapeHtmlText(book.author || '')}</div>
                    </div>`;
            }
        });
        if (!crContainer.innerHTML) crContainer.innerHTML = '<p style="color:#999; font-size:14px; background:#fff; padding:30px; border-radius:15px; text-align:center;">目前没有在读的书籍</p>';
    }

    async function saveBook() {
        const title = document.getElementById('input-title').value.trim();
        const author = document.getElementById('input-author').value.trim();
        const status = document.getElementById('input-status').value;
        const fileInput = document.getElementById('input-cover-file');
        if (!title) return alert("请填写书名");

        if (bookEntrySource === 'replace-reading') {
            if (!author) return alert("请填写作者");
            if (!fileInput.files || !fileInput.files[0]) return alert("请上传封面");
        }
        if (bookEntrySource === 'bookshelf' && bookshelfCoreOnlyUpload) {
            if (!author) return alert("请填写作者");
            if (!fileInput.files || !fileInput.files[0]) return alert("请上传封面");
        }

        // 「更换在读」：插入前将现有在读全部降为已读，保证库内仅一本在读
        if (bookEntrySource === 'replace-reading') {
            const { error: upErr } = await db.from('books').update({ status: 'read' }).eq('status', 'reading');
            if (upErr) { alert(upErr.message); return; }
        } else if (bookEntrySource === 'bookshelf' && !bookshelfCoreOnlyUpload && status === 'reading') {
            const { error: upErr } = await db.from('books').update({ status: 'read' }).eq('status', 'reading');
            if (upErr) { alert(upErr.message); return; }
        }

        const cover_url = await uploadFile(fileInput, 'covers');
        if (bookEntrySource === 'replace-reading' && !cover_url) return alert("封面上传失败，请重试");
        if (bookEntrySource === 'bookshelf' && bookshelfCoreOnlyUpload && !cover_url) return alert("封面上传失败，请重试");

        let row;
        if (bookEntrySource === 'replace-reading') {
            row = {
                title: title,
                author: author,
                status: 'reading',
                cover_url: cover_url,
                rating: 0,
                review: '',
                tags: []
            };
        } else if (bookEntrySource === 'bookshelf' && bookshelfCoreOnlyUpload) {
            row = {
                title: title,
                author: author,
                status: targetStatus,
                cover_url: cover_url,
                rating: 0,
                review: '',
                tags: []
            };
        } else {
            row = {
                title: title,
                author: author,
                status: status,
                cover_url: cover_url,
                rating: parseInt(document.getElementById('input-rating').value),
                review: document.getElementById('input-review').value,
                tags: []
            };
        }
        const { error } = await db.from('books').insert([row]);

        if (error) {
            document.getElementById('input-status').disabled = false;
            alert(error.message);
        } else {
            document.getElementById('input-status').disabled = false;
            closeModal('add-book-modal');
            fetchBooks();
        }
    }

    async function updateStatus(id, newStatus) {
        showLoading();
        await db.from('books').update({ status: newStatus }).eq('id', id);
        hideLoading();
        fetchBooks();
    }

    /** 从公开 URL 解析 covers 桶内对象路径，无法识别时返回 null */
    function coverStoragePathFromPublicUrl(url) {
        if (!url || typeof url !== 'string') return null;
        const u = url.trim();
        if (!u || u.startsWith('https://via.placeholder')) return null;
        const m = u.match(/\/object\/(?:public|sign)\/covers\/([^?#]+)/);
        return m ? decodeURIComponent(m[1]) : null;
    }

    async function deleteBook(id) {
        if (!confirm("确定要从馆藏中永久移除这本书吗？相关的阅读足迹也会一并删除，且无法恢复。")) return;
        showLoading();
        try {
            const { data: bk } = await db.from('books').select('cover_url').eq('id', id).maybeSingle();
            const path = coverStoragePathFromPublicUrl(bk && bk.cover_url);
            if (path) {
                const { error: stErr } = await db.storage.from('covers').remove([path]);
                if (stErr) console.warn('封面文件删除未成功（可忽略）:', stErr.message);
            }
        } catch (e) {
            console.warn('读取或删除封面时出错', e);
        }
        await db.from('reading_logs').delete().eq('book_id', id);
        const { error: delErr } = await db.from('books').delete().eq('id', id);
        hideLoading();
        if (delErr) {
            alert(delErr.message);
            return;
        }
        const onDetail = document.getElementById('detail-view').style.display !== 'none' && String(currentBookId) === String(id);
        if (onDetail) showHome();
        else fetchBooks();
    }

    async function openBookDetail(id) {
        currentBookId = id;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        showLoading();

        const { data: book } = await db.from('books').select('*').eq('id', id).single();
        const { data: logsRaw } = await db.from('reading_logs').select('*').eq('book_id', id);
        const logs = (logsRaw || []).slice().sort((a, b) =>
            new Date(logEffectiveTimestamp(b)).getTime() - new Date(logEffectiveTimestamp(a)).getTime());
        hideLoading();

        const cover = book.cover_url || 'https://via.placeholder.com/150x220?text=No+Cover';
        const r = Math.min(5, Math.max(0, Number(book.rating) || 0));
        let starButtons = '<div class="detail-rating-row" role="group" aria-label="点击星星评分">';
        for (let n = 1; n <= 5; n++) {
            starButtons += `<button type="button" class="detail-star ${n <= r ? 'on' : ''}" onclick="setBookRating(${book.id}, ${n})" title="${n}星" aria-label="${n}星">★</button>`;
        }
        starButtons += '</div>';

        const tags = normalizeTags(book);
        let tagsHtml = '<div class="detail-tags-section"><p class="detail-tags-label">标签 · 为这本书做分类</p><div class="detail-tag-bar">';
        tags.forEach(t => {
            tagsHtml += `<span class="tag-pill"><span>#${escapeHtmlText(t)}</span><button type="button" class="tag-remove" data-tag="${escapeHtmlAttr(t)}" aria-label="移除标签">×</button></span>`;
        });
        tagsHtml += `<button type="button" class="tag-add-btn" onclick="openAddTagModal()" title="添加标签">+</button></div></div>`;

        let html = `
            <div class="detail-meta-grid">
                <div class="detail-cover-wrap">
                    <img src="${cover}" class="detail-cover" alt="">
                </div>
                <div>
                    <h1 class="serif" style="font-size:36px; margin:0 0 20px 0;">${escapeHtmlText(book.title)}</h1>
                    <div class="info-row"><span class="info-label">作者</span><span>${escapeHtmlText(book.author || '')}</span></div>
                    <div class="info-row"><span class="info-label">评分</span>${starButtons}</div>
                    ${tagsHtml}
                </div>
            </div>`;

        if (book.review) {
            html += `<div class="review-section"><h4 class="serif" style="margin-top:0">读后感</h4>${escapeHtmlText(book.review)}</div>`;
        }

        document.getElementById('detail-content-wrapper').innerHTML = html;

        document.querySelectorAll('#detail-content-wrapper .tag-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                removeBookTag(btn.getAttribute('data-tag'));
            });
        });

        // 渲染足迹
        const timeline = document.getElementById('timeline-container');
        timeline.innerHTML = logs.length ? '' : '<p style="color:#999; font-size:14px;">暂无足迹记录</p>';
        logs.forEach(log => {
            const when = logEffectiveTimestamp(log);
            const dateStr = new Date(when).toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const isoAttr = escapeHtmlAttr(new Date(when).toISOString());
            const quoteRaw = (log.quote && String(log.quote).trim()) ? log.quote : '';
            const contentRaw = (log.content && String(log.content).trim()) ? log.content : '';
            const quoteBlock = quoteRaw
                ? `<blockquote class="log-quote-block">「${escapeHtmlText(quoteRaw)}」</blockquote>`
                : '';
            const noteBlock = contentRaw
                ? `<div class="log-note-block">${escapeHtmlText(contentRaw)}</div>`
                : '';
            const photoBlock = log.photo_url
                ? `<div class="log-photo-wrap"><img class="log-photo" src="${String(log.photo_url)}" alt=""></div>`
                : '';
            timeline.innerHTML += `
                <article class="timeline-card">
                    <div class="timeline-card-meta">
                        <button type="button" class="timeline-time-hit" data-log-id="${log.id}" data-iso="${isoAttr}" title="点击修改本条记录的时间">📅 ${dateStr}</button>
                        <span>·</span>
                        <span>${escapeHtmlText(log.weather || '未记录场景')}</span>
                    </div>
                    <div class="timeline-card-body">
                        ${quoteBlock}
                        ${noteBlock}
                        ${photoBlock}
                    </div>
                </article>`;
        });

        timeline.querySelectorAll('.timeline-time-hit').forEach(btn => {
            btn.addEventListener('click', () => startTimelineTimeEdit(btn));
        });
    }

    async function saveLog() {
        const quote = (document.getElementById('input-log-quote').value || '').trim();
        const content = (document.getElementById('input-log-content').value || '').trim();
        const fileInput = document.getElementById('input-log-photo');
        if (!quote && !content && !fileInput.files.length) return;

        const photo_url = await uploadFile(fileInput, 'logs');
        await db.from('reading_logs').insert([{
            book_id: currentBookId,
            weather: document.getElementById('input-log-weather').value,
            quote: quote,
            content: content,
            photo_url: photo_url
        }]);

        closeModal('add-log-modal');
        openBookDetail(currentBookId);
    }
</script>
